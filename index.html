<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trade Council">
<title>Conseil des 12 IA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #07070e; color: #e0e0f0; font-family: 'Courier New', monospace; padding: 16px 12px; min-height: 100vh; }
.header { text-align: center; margin-bottom: 16px; }
.header-sub { font-size: 9px; color: #f5a623; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
.header-title { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
.box { background: #09090f; border: 1px solid #141428; border-radius: 12px; padding: 14px 12px; margin-bottom: 12px; max-width: 640px; margin-left: auto; margin-right: auto; }
.label { color: #444466; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.btns { display: flex; flex-wrap: wrap; gap: 5px; }
.btn { padding: 6px 11px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: monospace; border: 1px solid #2a2a40; background: #0c0c1a; color: #555577; font-weight: 400; transition: all 0.15s; }
.btn.gold { border-color: #f5a623; background: #f5a62320; color: #f5a623; font-weight: 700; }
.btn.purple { border-color: #8888ff; background: #8888ff20; color: #8888ff; font-weight: 700; }
.dir-row { display: flex; gap: 8px; }
.dir-btn { flex: 1; padding: 10px 0; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: monospace; font-weight: 700; border: 1px solid #1e1e30; background: #0c0c1a; color: #333355; transition: all 0.15s; }
.dir-btn.long { border-color: #00e5a0; background: #00e5a018; color: #00e5a0; }
.dir-btn.short { border-color: #ff4466; background: #ff446618; color: #ff4466; }
.go-btn { width: 100%; padding: 13px 0; background: linear-gradient(135deg,#f5a623,#d4870a); border: none; border-radius: 8px; color: #07070e; font-size: 13px; font-weight: 900; letter-spacing: 2px; cursor: pointer; font-family: monospace; text-transform: uppercase; margin-top: 12px; }
.go-btn:disabled { background: #111120; color: #333; cursor: not-allowed; }
.status { font-size: 10px; text-align: center; margin-top: 8px; min-height: 14px; color: #555577; }
.gauge { display: none; background: #09090f; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; max-width: 640px; margin-left: auto; margin-right: auto; }
.gauge-title { font-size: 22px; font-weight: 900; font-family: monospace; letter-spacing: 2px; text-align: center; }
.gauge-sub { color: #444466; font-size: 10px; text-align: center; margin-top: 2px; margin-bottom: 10px; }
.gauge-bar { display: flex; gap: 2px; height: 5px; border-radius: 3px; overflow: hidden; }
.gauge-counts { display: flex; justify-content: space-around; margin-top: 7px; }
.gc { text-align: center; }
.gc-num { font-size: 14px; font-weight: 700; }
.gc-lbl { font-size: 8px; color: #2a2a44; }
.cards { max-width: 640px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.card { background: #0c0c1a; border: 1px solid #1a1a2a; border-radius: 9px; padding: 11px 12px; transition: background 0.5s, border-color 0.5s; }
.card-head { display: flex; align-items: center; gap: 7px; }
.card-name { flex: 1; color: #ddddf0; font-size: 11px; font-weight: 700; }
.card-role { color: #333355; font-size: 8px; text-transform: uppercase; letter-spacing: 1px; }
.badge { display: none; border-radius: 4px; padding: 1px 6px; font-size: 9px; font-weight: 700; }
.card-reason { display: none; color: #777788; font-size: 9px; line-height: 1.4; font-style: italic; margin-top: 5px; }
.bar-wrap { display: none; width: 100%; height: 2px; background: #ffffff0a; border-radius: 1px; margin-top: 5px; }
.bar { height: 100%; border-radius: 1px; width: 0; transition: width 1s; }
.conf { display: none; color: #333355; font-size: 8px; margin-top: 2px; }
.ctx-input { width: 100%; background: #0c0c1a; border: 1px solid #1e1e30; border-radius: 6px; color: #9999bb; font-size: 11px; font-family: monospace; padding: 8px 9px; margin-top: 10px; outline: none; }
.footer { text-align: center; margin-top: 18px; color: #111122; font-size: 8px; letter-spacing: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">⚡ Trade Decision Engine</div>
  <div class="header-title">CONSEIL DES 12 IA</div>
</div>

<div class="box">
  <div class="label">Marché</div>
  <div class="btns" id="markets"></div>
  <div class="label" style="margin-top:12px">Direction</div>
  <div class="dir-row">
    <button class="dir-btn long" id="btn-long" onclick="setDir('LONG')">▲ LONG</button>
    <button class="dir-btn" id="btn-short" onclick="setDir('SHORT')">▼ SHORT</button>
  </div>
  <div class="label" style="margin-top:12px">Unité de temps</div>
  <div class="btns" id="tfs"></div>
  <input class="ctx-input" id="ctx" placeholder="Contexte : niveau clé, signal Predicta, RSI, HTF..." />
  <button class="go-btn" id="go-btn" onclick="run()">⚡ CONSULTER LES 12 IA</button>
  <div class="status" id="status"></div>
</div>

<div class="gauge" id="gauge">
  <div class="gauge-title" id="gauge-title"></div>
  <div class="gauge-sub" id="gauge-sub"></div>
  <div class="gauge-bar" id="gauge-bar"></div>
  <div class="gauge-counts" id="gauge-counts"></div>
</div>

<div class="cards" id="cards"></div>
<div class="footer">PREDICTA TRADE COUNCIL · V10.0 · REAL AI</div>

<script>
const API_KEY = "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";

const MARKETS = ["XAU/USD","EUR/USD","GBP/USD","NAS100","US30","BTC/USD","ETH/USD","US500","USD/JPY","OIL/USD"];
const TFS = ["M1","M5","M15","H1","H4","D1"];
const VC = {BUY:"#00e5a0",SELL:"#ff4466",WAIT:"#f5a623",SKIP:"#8888aa"};
const VL = {BUY:"LONG ✅",SELL:"SHORT ✅",WAIT:"ATTENDRE ⏳",SKIP:"PASSER ❌"};
const PERSONAS = [
  {id:1,name:"Warren B.",emoji:"🏦",role:"Value Purist",bias:"contrarian value investor"},
  {id:2,name:"Quant Alpha",emoji:"🤖",role:"Algorithme pur",bias:"pure algorithmic data-driven"},
  {id:3,name:"Scalper X",emoji:"⚡",role:"M1 Sniper",bias:"aggressive momentum scalper"},
  {id:4,name:"Dr. Risk",emoji:"🛡️",role:"Risk Manager",bias:"ultra conservative risk manager"},
  {id:5,name:"Luna HTF",emoji:"🌙",role:"Macro Vision",bias:"higher timeframe macro analyst"},
  {id:6,name:"Bull Ran",emoji:"🐂",role:"Trend Follower",bias:"trend following always bullish"},
  {id:7,name:"Bear Khan",emoji:"🐻",role:"Short Specialist",bias:"short seller always bearish"},
  {id:8,name:"Sensei PA",emoji:"🧘",role:"Price Action",bias:"pure price action structure"},
  {id:9,name:"Crypto Rex",emoji:"🦖",role:"Volatility",bias:"volatility and momentum hunter"},
  {id:10,name:"Lady Macro",emoji:"🌐",role:"Fondamentaux",bias:"macro fundamentals analyst"},
  {id:11,name:"Predicta",emoji:"🔮",role:"IA Prédictive",bias:"AI pattern recognition predictive"},
  {id:12,name:"Ghost SMC",emoji:"👻",role:"Smart Money",bias:"smart money concepts institutional"},
];

let market="XAU/USD", dir="LONG", tf="M5";

const mEl=document.getElementById("markets");
MARKETS.forEach(m=>{
  const b=document.createElement("button");
  b.className="btn"+(m===market?" gold":""); b.textContent=m;
  b.onclick=()=>{market=m;mEl.querySelectorAll(".btn").forEach(x=>x.className="btn");b.className="btn gold";};
  mEl.appendChild(b);
});

const tfEl=document.getElementById("tfs");
TFS.forEach(t=>{
  const b=document.createElement("button");
  b.className="btn"+(t===tf?" purple":""); b.textContent=t;
  b.onclick=()=>{tf=t;tfEl.querySelectorAll(".btn").forEach(x=>x.className="btn");b.className="btn purple";};
  tfEl.appendChild(b);
});

function setDir(d){
  dir=d;
  document.getElementById("btn-long").className="dir-btn"+(d==="LONG"?" long":"");
  document.getElementById("btn-short").className="dir-btn"+(d==="SHORT"?" short":"");
}

const cardsEl=document.getElementById("cards");
PERSONAS.forEach(p=>{
  const div=document.createElement("div");
  div.className="card"; div.id="card-"+p.id;
  div.innerHTML=`<div class="card-head"><span style="font-size:17px">${p.emoji}</span><div style="flex:1"><div class="card-name">${p.name}</div><div class="card-role">${p.role}</div></div><span class="badge" id="badge-${p.id}"></span></div><div class="card-reason" id="reason-${p.id}"></div><div class="bar-wrap" id="barw-${p.id}"><div class="bar" id="bar-${p.id}"></div></div><div class="conf" id="conf-${p.id}"></div>`;
  cardsEl.appendChild(div);
});

function parseVerdicts(text){
  const out={};
  for(const line of text.split("\n")){
    const m=line.trim().match(/^(\d{1,2})[\s.):-]+\s*(BUY|SELL|WAIT|SKIP)\s+(\d{1,3})%?\s+(.*)/i);
    if(!m)continue;
    const id=+m[1];
    if(id>=1&&id<=12)out[id]={verdict:m[2].toUpperCase(),confidence:+m[3],reason:m[4].trim()};
  }
  return out;
}

function resetCards(){
  PERSONAS.forEach(p=>{
    const c=document.getElementById("card-"+p.id);
    c.style.background="#0c0c1a"; c.style.borderColor="#1a1a2a";
    ["badge","reason","barw","conf"].forEach(x=>document.getElementById(x+"-"+p.id).style.display="none");
    document.getElementById("bar-"+p.id).style.width="0";
  });
  document.getElementById("gauge").style.display="none";
}

function showCard(id,verdict,confidence,reason){
  const c=VC[verdict];
  document.getElementById("card-"+id).style.background=c+"09";
  document.getElementById("card-"+id).style.borderColor=c+"30";
  const badge=document.getElementById("badge-"+id);
  badge.textContent=verdict;
  badge.style.cssText=`display:inline;background:${c}20;color:${c};border:1px solid ${c}44;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700`;
  const rea=document.getElementById("reason-"+id);
  rea.textContent='"'+reason+'"'; rea.style.display="block";
  document.getElementById("barw-"+id).style.display="block";
  setTimeout(()=>document.getElementById("bar-"+id).style.width=confidence+"%",50);
  document.getElementById("bar-"+id).style.background=c;
  const conf=document.getElementById("conf-"+id);
  conf.textContent=confidence+"%"; conf.style.display="block";
}

function showGauge(parsed){
  const counts={BUY:0,SELL:0,WAIT:0,SKIP:0};
  Object.values(parsed).forEach(v=>{if(v?.verdict)counts[v.verdict]++;});
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const c=VC[top[0]];
  const gauge=document.getElementById("gauge");
  gauge.style.cssText=`display:block;background:#09090f;border:1px solid ${c}30;border-radius:12px;padding:14px 16px;margin-bottom:12px;max-width:640px;margin-left:auto;margin-right:auto`;
  document.getElementById("gauge-title").textContent=VL[top[0]];
  document.getElementById("gauge-title").style.color=c;
  document.getElementById("gauge-sub").textContent=top[1]+"/12 IAs";
  document.getElementById("gauge-bar").innerHTML=["BUY","SELL","WAIT","SKIP"].filter(k=>counts[k]>0).map(k=>`<div style="flex:${counts[k]};background:${VC[k]};height:100%"></div>`).join("");
  document.getElementById("gauge-counts").innerHTML=["BUY","SELL","WAIT","SKIP"].map(k=>`<div class="gc"><div class="gc-num" style="color:${VC[k]}">${counts[k]}</div><div class="gc-lbl">${k}</div></div>`).join("");
}

async function run(){
  const btn=document.getElementById("go-btn");
  const statusEl=document.getElementById("status");
  btn.disabled=true; btn.textContent="ANALYSE... 0/12";
  statusEl.style.color="#555577"; statusEl.textContent="Connexion IA...";
  resetCards();

  const ctx=document.getElementById("ctx").value.trim();
  const prompt=`You are 12 different trader personas. Analyze this trade setup.

SETUP: ${dir} ${market} on ${tf} timeframe${ctx?"\nCONTEXT: "+ctx:""}

PERSONAS:
${PERSONAS.map(p=>`${p.id}. ${p.name} (${p.bias})`).join("\n")}

Output EXACTLY 12 lines:
1. BUY 82% Raison courte en français.
2. SELL 71% Raison courte en français.
(etc for all 12)

Rules: verdict=BUY/SELL/WAIT/SKIP, confidence=0-100, reason=1 French sentence. 12 lines only.`;

  try{
    const url="https://corsproxy.io/?"+encodeURIComponent("https://api.anthropic.com/v1/messages");
    const res=await fetch(url,{
      method:"POST",
      headers:{
        "content-type":"application/json",
        "anthropic-version":"2023-06-01",
        "x-api-key":API_KEY,
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:800,
        messages:[{role:"user",content:prompt}],
      }),
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      throw new Error(e?.error?.message||"Erreur "+res.status);
    }
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||"").join("");
    const parsed=parseVerdicts(text);
    let count=0;
    for(let i=0;i<PERSONAS.length;i++){
      await new Promise(r=>setTimeout(r,80));
      const p=PERSONAS[i];
      const v=parsed[p.id]||{verdict:"WAIT",confidence:50,reason:"Données insuffisantes."};
      showCard(p.id,v.verdict,v.confidence,v.reason);
      count++;
      btn.textContent=`ANALYSE... ${count}/12`;
    }
    showGauge(parsed);
    statusEl.style.color="#00e5a066";
    statusEl.textContent="✅ Analyse terminée";
  }catch(e){
    statusEl.style.color="#ff4466";
    statusEl.textContent="❌ "+e.message;
  }
  btn.disabled=false;
  btn.textContent="⚡ CONSULTER LES 12 IA";
}
</script>
</body>
</html>
